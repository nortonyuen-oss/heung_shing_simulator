name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            command: npm run dist:mac -- --arm64 --publish never
            artifact: mac-arm64-installers
          - os: macos-15
            command: npm run dist:mac -- --x64 --publish never
            artifact: mac-x64-installers
          - os: windows-latest
            command: npm run dist:win -- --publish never
            artifact: windows-installers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        shell: bash
        run: ${{ matrix.command }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets
          mac_arm64_dmg="$(find artifacts/mac-arm64-installers -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          mac_x64_dmg="$(find artifacts/mac-x64-installers -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          win_setup="$(find artifacts/windows-installers -maxdepth 1 -type f -name '*Setup*.exe' | head -n 1)"
          win_portable="$(find artifacts/windows-installers -maxdepth 1 -type f -name '*.exe' ! -name '*Setup*' | head -n 1)"
          win_latest="$(find artifacts/windows-installers -maxdepth 1 -type f -name 'latest.yml' | head -n 1)"
          win_setup_blockmap="$(find artifacts/windows-installers -maxdepth 1 -type f -name '*Setup*.exe.blockmap' | head -n 1)"
          test -n "$mac_arm64_dmg"
          test -n "$mac_x64_dmg"
          test -n "$win_setup"
          test -n "$win_portable"
          test -n "$win_latest"
          test -n "$win_setup_blockmap"
          setup_public="The.City.of.Heung.Shing.Setup.${version}.exe"
          cp "$mac_arm64_dmg" "release-assets/The.City.of.Heung.Shing-${version}-arm64.dmg"
          cp "$mac_x64_dmg" "release-assets/The.City.of.Heung.Shing-${version}-x64.dmg"
          cp "$win_setup" "release-assets/${setup_public}"
          cp "$win_portable" "release-assets/The.City.of.Heung.Shing.${version}.exe"
          cp "$win_setup_blockmap" "release-assets/${setup_public}.blockmap"
          cp "$win_latest" "release-assets/latest.yml"
          OLD_SETUP="$(basename "$win_setup")" \
          OLD_BLOCKMAP="$(basename "$win_setup_blockmap")" \
          SETUP_PUBLIC="$setup_public" \
          perl -0pi -e 's/\Q$ENV{OLD_SETUP}\E/$ENV{SETUP_PUBLIC}/g; s/\Q$ENV{OLD_BLOCKMAP}\E/$ENV{SETUP_PUBLIC}.blockmap/g; s/^(\s*-\s*url:\s*).*?$/$1$ENV{SETUP_PUBLIC}/mg; s/^(path:\s*).*?$/$1$ENV{SETUP_PUBLIC}/mg' release-assets/latest.yml
          ls -lh release-assets

      - name: Create release and upload installers
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "The City of Heung Shing ${GITHUB_REF_NAME}" \
            --notes "Desktop installers for The City of Heung Shing ${GITHUB_REF_NAME}. Windows auto-update metadata is included for installed desktop builds." \
            release-assets/*
