name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            command: npm run dist:mac -- --publish never
            artifact: mac-installers
          - os: windows-latest
            command: npm run dist:win -- --publish never
            artifact: windows-installers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        shell: bash
        run: ${{ matrix.command }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets
          cp "artifacts/mac-installers/The City of Heung Shing-${version}.dmg" \
             "release-assets/The.City.of.Heung.Shing-${version}.dmg"
          cp "artifacts/windows-installers/The City of Heung Shing Setup ${version}.exe" \
             "release-assets/The.City.of.Heung.Shing.Setup.${version}.exe"
          cp "artifacts/windows-installers/The City of Heung Shing ${version}.exe" \
             "release-assets/The.City.of.Heung.Shing.${version}.exe"
          ls -lh release-assets

      - name: Create release and upload installers
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "The City of Heung Shing ${GITHUB_REF_NAME}" \
            --notes "Desktop installers for The City of Heung Shing ${GITHUB_REF_NAME}." \
            release-assets/*
